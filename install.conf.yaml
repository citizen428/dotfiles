# Settings
- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ["~", "~/.config", "/usr/local/bin"]

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.asdfrc:
    ~/Brewfile:
    ~/.default-gems:
    ~/.gitattributes:
    ~/.gitconfig:
    ~/.gitignore:
    ~/.neomutt/colorschemes: neomutt/colorschemes
    ~/.neomuttrc:
    ~/.pryrc:
    ~/.psqlrc:
    ~/.tmux.conf:
    /usr/local/bin/git-wtf: bin/git-wtf
    /usr/local/bin/imgcat: bin/imgcat
