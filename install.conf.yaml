# Settings
- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ["~", "~/.config", "/usr/local/bin"]

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.asdfrc:
    ~/Brewfile:
    #~/bin:
    #~/.config/kitty/kitty.conf:
    ~/.default-gems:
    # ~/.ghci:
    ~/.gitconfig:
    ~/.gitignore:
    ~/.pryrc:
    # ~/.spacemacs:
    ~/.tmux.conf:
    ~/.zshrc:
    ~/.zsh:
    /usr/local/bin/git-wtf: bin/git-wtf
    /usr/local/bin/imgcat: bin/imgcat
